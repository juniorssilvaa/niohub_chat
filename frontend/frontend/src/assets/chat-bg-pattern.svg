<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="internetProviderPattern" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <g fill="#8696a0" opacity="0.12">
        <!-- Sinal WiFi -->
        <path d="M 40 40 Q 60 20 80 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M 50 50 Q 60 40 70 50" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="60" cy="55" r="2" fill="currentColor"/>
        
        <!-- Servidor/Rack -->
        <rect x="120" y="30" width="50" height="40" rx="3" fill="currentColor"/>
        <rect x="125" y="35" width="40" height="5" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="125" y="45" width="40" height="5" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="125" y="55" width="40" height="5" rx="1" fill="currentColor" opacity="0.5"/>
        <circle cx="140" cy="38" r="2" fill="currentColor"/>
        <circle cx="150" cy="38" r="2" fill="currentColor"/>
        
        <!-- Antena de transmissão -->
        <line x1="220" y1="70" x2="220" y2="30" stroke="currentColor" stroke-width="2"/>
        <circle cx="220" cy="30" r="5" fill="currentColor"/>
        <path d="M 220 30 L 210 20 M 220 30 L 230 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M 220 30 L 215 25 M 220 30 L 225 25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        
        <!-- Satélite -->
        <circle cx="320" cy="50" r="12" fill="currentColor"/>
        <rect x="315" y="45" width="10" height="10" rx="2" fill="currentColor" opacity="0.5"/>
        <path d="M 308 50 L 300 50 M 332 50 L 340 50 M 320 38 L 320 30 M 320 62 L 320 70" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Roteador -->
        <rect x="30" y="120" width="45" height="30" rx="4" fill="currentColor"/>
        <rect x="35" y="125" width="35" height="5" rx="1" fill="currentColor" opacity="0.5"/>
        <circle cx="42" cy="140" r="2" fill="currentColor"/>
        <circle cx="52" cy="140" r="2" fill="currentColor"/>
        <circle cx="62" cy="140" r="2" fill="currentColor"/>
        <path d="M 30 135 L 20 135 M 75 135 L 85 135" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Nuvem (Cloud) -->
        <ellipse cx="150" cy="130" rx="20" ry="15" fill="currentColor"/>
        <ellipse cx="165" cy="125" rx="15" ry="12" fill="currentColor"/>
        <ellipse cx="135" cy="125" rx="12" ry="10" fill="currentColor"/>
        <path d="M 145 140 L 145 155 L 155 155 L 155 140" fill="currentColor" opacity="0.5"/>
        
        <!-- Cabo de rede -->
        <path d="M 240 120 Q 250 130 260 120 Q 270 110 280 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <circle cx="240" cy="120" r="4" fill="currentColor"/>
        <circle cx="280" cy="120" r="4" fill="currentColor"/>
        <rect x="245" y="118" width="30" height="4" rx="1" fill="currentColor" opacity="0.5"/>
        
        <!-- Torre de transmissão -->
        <line x1="340" y1="200" x2="340" y2="120" stroke="currentColor" stroke-width="3"/>
        <line x1="330" y1="140" x2="350" y2="140" stroke="currentColor" stroke-width="2"/>
        <line x1="330" y1="160" x2="350" y2="160" stroke="currentColor" stroke-width="2"/>
        <line x1="330" y1="180" x2="350" y2="180" stroke="currentColor" stroke-width="2"/>
        <path d="M 340 120 L 335 110 M 340 120 L 345 110" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Dispositivo móvel com sinal -->
        <rect x="40" y="200" width="25" height="40" rx="4" fill="currentColor"/>
        <rect x="45" y="210" width="15" height="20" rx="2" fill="currentColor" opacity="0.3"/>
        <circle cx="52" cy="235" r="3" fill="currentColor" opacity="0.5"/>
        <path d="M 65 220 Q 75 215 85 220" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M 70 225 Q 75 220 80 225" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="75" cy="228" r="1.5" fill="currentColor"/>
        
        <!-- Data Center -->
        <rect x="120" y="200" width="60" height="40" rx="3" fill="currentColor"/>
        <rect x="125" y="205" width="50" height="6" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="125" y="215" width="50" height="6" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="125" y="225" width="50" height="6" rx="1" fill="currentColor" opacity="0.5"/>
        <circle cx="135" cy="208" r="2" fill="currentColor"/>
        <circle cx="145" cy="208" r="2" fill="currentColor"/>
        <circle cx="155" cy="208" r="2" fill="currentColor"/>
        <circle cx="165" cy="208" r="2" fill="currentColor"/>
        
        <!-- Fibra óptica -->
        <line x1="220" y1="200" x2="220" y2="240" stroke="currentColor" stroke-width="2"/>
        <circle cx="220" cy="200" r="4" fill="currentColor"/>
        <circle cx="220" cy="240" r="4" fill="currentColor"/>
        <path d="M 220 210 L 215 215 L 220 220 L 225 215 Z" fill="currentColor" opacity="0.5"/>
        <path d="M 220 225 L 215 230 L 220 235 L 225 230 Z" fill="currentColor" opacity="0.5"/>
        
        <!-- Modem -->
        <rect x="280" y="200" width="40" height="25" rx="3" fill="currentColor"/>
        <rect x="285" y="205" width="30" height="4" rx="1" fill="currentColor" opacity="0.5"/>
        <circle cx="290" cy="218" r="2" fill="currentColor"/>
        <circle cx="300" cy="218" r="2" fill="currentColor"/>
        <circle cx="310" cy="218" r="2" fill="currentColor"/>
        <path d="M 280 212 L 270 212 M 320 212 L 330 212" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Conexão global -->
        <circle cx="60" cy="300" r="20" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M 40 300 Q 50 290 60 300 Q 70 310 80 300" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M 50 280 Q 60 290 70 280" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M 50 320 Q 60 310 70 320" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="60" cy="300" r="3" fill="currentColor"/>
        
        <!-- Switch de rede -->
        <rect x="130" y="280" width="50" height="35" rx="4" fill="currentColor"/>
        <rect x="135" y="285" width="40" height="5" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="135" y="295" width="40" height="5" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="135" y="305" width="40" height="5" rx="1" fill="currentColor" opacity="0.5"/>
        <circle cx="142" cy="288" r="2" fill="currentColor"/>
        <circle cx="152" cy="288" r="2" fill="currentColor"/>
        <circle cx="162" cy="288" r="2" fill="currentColor"/>
        <circle cx="172" cy="288" r="2" fill="currentColor"/>
        
        <!-- Sinal de conexão -->
        <path d="M 240 280 L 240 320" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M 250 290 L 250 320" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M 260 285 L 260 320" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M 270 280 L 270 320" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="240" cy="280" r="3" fill="currentColor"/>
        <circle cx="250" cy="290" r="3" fill="currentColor"/>
        <circle cx="260" cy="285" r="3" fill="currentColor"/>
        <circle cx="270" cy="280" r="3" fill="currentColor"/>
        
        <!-- Disco rígido/Storage -->
        <rect x="310" y="280" width="40" height="30" rx="3" fill="currentColor"/>
        <rect x="315" y="285" width="30" height="4" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="315" y="293" width="30" height="4" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="315" y="301" width="30" height="4" rx="1" fill="currentColor" opacity="0.5"/>
        <circle cx="320" cy="287" r="1.5" fill="currentColor"/>
        <circle cx="325" cy="287" r="1.5" fill="currentColor"/>
        <circle cx="330" cy="287" r="1.5" fill="currentColor"/>
        <circle cx="335" cy="287" r="1.5" fill="currentColor"/>
        
        <!-- Conexão ponto a ponto -->
        <circle cx="50" cy="360" r="8" fill="currentColor"/>
        <circle cx="150" cy="360" r="8" fill="currentColor"/>
        <path d="M 58 360 Q 100 340 142 360" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="100" cy="340" r="4" fill="currentColor"/>
        
        <!-- Router/WiFi Router -->
        <rect x="200" y="340" width="50" height="30" rx="4" fill="currentColor"/>
        <rect x="205" y="345" width="40" height="4" rx="1" fill="currentColor" opacity="0.5"/>
        <circle cx="210" cy="360" r="2" fill="currentColor"/>
        <circle cx="220" cy="360" r="2" fill="currentColor"/>
        <circle cx="230" cy="360" r="2" fill="currentColor"/>
        <circle cx="240" cy="360" r="2" fill="currentColor"/>
        <path d="M 250 355 Q 260 350 270 355" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M 255 358 Q 260 353 265 358" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="260" cy="360" r="1.5" fill="currentColor"/>
        
        <!-- Nuvem de dados -->
        <ellipse cx="330" cy="350" rx="25" ry="20" fill="currentColor"/>
        <ellipse cx="350" cy="345" rx="18" ry="15" fill="currentColor"/>
        <ellipse cx="310" cy="345" rx="15" ry="12" fill="currentColor"/>
        <path d="M 325 360 L 325 375 L 335 375 L 335 360" fill="currentColor" opacity="0.5"/>
        <path d="M 320 350 L 315 340 M 340 350 L 345 340" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#internetProviderPattern)"/>
</svg>
