version: "3.8"

services:

  # ===============================
  # 🐘 POSTGRESQL (VOLUME PERSISTENTE)
  # ===============================
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - niochat-postgres:/var/lib/postgresql/data
    networks:
      nethub:
        aliases:
          - niochat_postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      restart_policy:
        condition: on-failure

  # ===============================
  # 🧠 BACKEND DJANGO (API + WS)
  # ===============================
  niochat-backend:
    image: ghcr.io/juniorssilvaa/niohub_chat-backend:${PROVIDER_IMAGE_TAG:-stable}
    depends_on:
      - postgres
    networks:
      - nethub
    volumes:
      - niochat-media:/app/backend/media
      - niochat-static:/app/backend/staticfiles
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_AI_DB: 1
      REDIS_CONVERSATION_DB: 2
      REDIS_CACHE_DB: 3
      DRAMATIQ_BROKER_URL: ${DRAMATIQ_BROKER_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      EVOLUTION_URL: ${EVOLUTION_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_SYSTEM_USER_TOKEN: ${WHATSAPP_SYSTEM_USER_TOKEN}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=nethub"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-api.rule=Host(`__PROVIDER_HOST__`) && PathPrefix(`/api/`)"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-api.entrypoints=websecure"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-api.priority=20"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-api.service=__TRAEFIK_ROUTER_PREFIX__-api-svc"
        - "traefik.http.services.__TRAEFIK_ROUTER_PREFIX__-api-svc.loadbalancer.server.port=8010"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-ws.rule=Host(`__PROVIDER_HOST__`) && PathPrefix(`/ws/`)"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-ws.entrypoints=websecure"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-ws.priority=30"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-ws.service=__TRAEFIK_ROUTER_PREFIX__-api-svc"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-hooks.rule=Host(`__PROVIDER_HOST__`) && PathPrefix(`/webhooks/`)"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-hooks.entrypoints=websecure"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-hooks.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-hooks.priority=20"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-hooks.service=__TRAEFIK_ROUTER_PREFIX__-api-svc"

  # ===============================
  # ⚙️ DRAMATIQ WORKER
  # ===============================
  niochat-dramatiq:
    image: ghcr.io/juniorssilvaa/niohub_chat-dramatiq:${PROVIDER_IMAGE_TAG:-stable}
    depends_on:
      - postgres
    networks:
      - nethub
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      DRAMATIQ_BROKER_URL: ${DRAMATIQ_BROKER_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_HEARTBEAT: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      EVOLUTION_URL: ${EVOLUTION_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
    command: ["python", "-m", "dramatiq", "conversations.dramatiq_tasks", "integrations.dramatiq_tasks"]
    deploy:
      restart_policy:
        condition: on-failure

  # ===============================
  # 📱 TELEGRAM WORKER
  # ===============================
  niochat-telegram:
    image: ghcr.io/juniorssilvaa/niohub_chat-backend:${PROVIDER_IMAGE_TAG:-stable}
    depends_on:
      - postgres
    networks:
      - nethub
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
    command: ["python", "manage.py", "telegram_worker", "start"]
    deploy:
      restart_policy:
        condition: on-failure

  # ===============================
  # 🌐 FRONTEND
  # ===============================
  niochat-frontend:
    image: ghcr.io/juniorssilvaa/niohub_chat-frontend:${PROVIDER_IMAGE_TAG:-stable}
    networks:
      - nethub
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=nethub"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-fe.rule=Host(`__PROVIDER_HOST__`)"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-fe.entrypoints=websecure"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-fe.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-fe.priority=1"
        - "traefik.http.routers.__TRAEFIK_ROUTER_PREFIX__-fe.service=__TRAEFIK_ROUTER_PREFIX__-fe-svc"
        - "traefik.http.services.__TRAEFIK_ROUTER_PREFIX__-fe-svc.loadbalancer.server.port=8012"

networks:
  nethub:
    external: true

volumes:
  niochat-postgres:
  niochat-media:
  niochat-static:
