version: "3.8"

services:

  # ===============================
  # 🐘 POSTGRESQL (VOLUME PERSISTENTE)
  # ===============================
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - niochat-postgres:/var/lib/postgresql/data
    networks:
      nethub:
        aliases:
          - niochat_postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      restart_policy:
        condition: on-failure

  # ===============================
  # 🧠 BACKEND DJANGO (API + WS)
  # ===============================
  niochat-backend:
    image: ghcr.io/juniorssilvaa/niohub_chat-backend:${PROVIDER_IMAGE_TAG:-stable}
    depends_on:
      - postgres
    networks:
      - nethub
    volumes:
      - niochat-media:/app/backend/media
      - niochat-static:/app/backend/staticfiles
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_AI_DB: 1
      REDIS_CONVERSATION_DB: 2
      REDIS_CACHE_DB: 3
      DRAMATIQ_BROKER_URL: ${DRAMATIQ_BROKER_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      EVOLUTION_URL: ${EVOLUTION_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_SYSTEM_USER_TOKEN: ${WHATSAPP_SYSTEM_USER_TOKEN}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.niochat-backend.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.niohub.com.br`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.niochat-backend.entrypoints=websecure"
      - "traefik.http.routers.niochat-backend.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.niochat-backend.priority=20"
      - "traefik.http.services.niochat-backend.loadbalancer.server.port=8010"
      - "traefik.http.routers.niochat-backend-ws.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.niohub.com.br`) && PathPrefix(`/ws/`)"
      - "traefik.http.routers.niochat-backend-ws.entrypoints=websecure"
      - "traefik.http.routers.niochat-backend-ws.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.niochat-backend-ws.priority=30"
      - "traefik.http.routers.niochat-backend-ws.service=niochat-backend"
      - "traefik.http.routers.niochat-backend-webhooks.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.niohub.com.br`) && PathPrefix(`/webhooks/`)"
      - "traefik.http.routers.niochat-backend-webhooks.entrypoints=websecure"
      - "traefik.http.routers.niochat-backend-webhooks.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.niochat-backend-webhooks.priority=20"
      - "traefik.http.routers.niochat-backend-webhooks.service=niochat-backend"
    deploy:
      restart_policy:
        condition: on-failure

  # ===============================
  # ⚙️ DRAMATIQ WORKER
  # ===============================
  niochat-dramatiq:
    image: ghcr.io/juniorssilvaa/niohub_chat-dramatiq:${PROVIDER_IMAGE_TAG:-stable}
    depends_on:
      - postgres
    networks:
      - nethub
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      DRAMATIQ_BROKER_URL: ${DRAMATIQ_BROKER_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_HEARTBEAT: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      EVOLUTION_URL: ${EVOLUTION_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
    command: ["python", "-m", "dramatiq", "conversations.dramatiq_tasks", "integrations.dramatiq_tasks"]
    deploy:
      restart_policy:
        condition: on-failure

  # ===============================
  # 📱 TELEGRAM WORKER
  # ===============================
  niochat-telegram:
    image: ghcr.io/juniorssilvaa/niohub_chat-backend:${PROVIDER_IMAGE_TAG:-stable}
    depends_on:
      - postgres
    networks:
      - nethub
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
    command: ["python", "manage.py", "telegram_worker", "start"]
    deploy:
      restart_policy:
        condition: on-failure

  # ===============================
  # 🌐 FRONTEND
  # ===============================
  niochat-frontend:
    image: ghcr.io/juniorssilvaa/niohub_chat-frontend:${PROVIDER_IMAGE_TAG:-stable}
    networks:
      - nethub
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.niochat-frontend.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.niohub.com.br`)"
      - "traefik.http.routers.niochat-frontend.entrypoints=websecure"
      - "traefik.http.routers.niochat-frontend.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.niochat-frontend.priority=1"
    deploy:
      restart_policy:
        condition: on-failure

networks:
  nethub:
    external: true

volumes:
  niochat-postgres:
  niochat-media:
  niochat-static:
