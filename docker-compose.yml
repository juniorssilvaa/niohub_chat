version: "3.8"

services:

  # ===============================
  # 🐘 POSTGRESQL (VOLUME PERSISTENTE)
  # ===============================
  postgres:
    image: postgres:14
    container_name: niochat_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - niochat-postgres:/var/lib/postgresql/data
    networks:
      nioNet:
        aliases:
          - niochat_postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # ===============================
  # 🧠 BACKEND DJANGO (API + WS)
  # ===============================
  niochat-backend:
    image: ghcr.io/juniorssilvaa/niohub_chat-backend:latest
    container_name: niochat_backend
    depends_on:
      - postgres
    networks:
      - nioNet
    volumes:
      - niochat-media:/app/backend/media
      - niochat-static:/app/backend/staticfiles
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ENVIRONMENT: production

      DATABASE_URL: ${DATABASE_URL}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_AI_DB: 1
      REDIS_CONVERSATION_DB: 2
      REDIS_CACHE_DB: 3

      DRAMATIQ_BROKER_URL: ${DRAMATIQ_BROKER_URL}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      EVOLUTION_URL: ${EVOLUTION_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}

      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_SYSTEM_USER_TOKEN: ${WHATSAPP_SYSTEM_USER_TOKEN}

      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.niochat-backend.rule=(Host(`api.niohub.com.br`) || Host(`chat.niohub.com.br`)) && PathPrefix(`/api/`)"
      - "traefik.http.routers.niochat-backend.entrypoints=websecure"
      - "traefik.http.routers.niochat-backend.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.niochat-backend.priority=20"
      - "traefik.http.services.niochat-backend.loadbalancer.server.port=8010"

      - "traefik.http.routers.niochat-backend-ws.rule=(Host(`api.niohub.com.br`) || Host(`chat.niohub.com.br`)) && PathPrefix(`/ws/`)"
      - "traefik.http.routers.niochat-backend-ws.entrypoints=websecure"
      - "traefik.http.routers.niochat-backend-ws.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.niochat-backend-ws.priority=20"
      - "traefik.http.routers.niochat-backend-ws.service=niochat-backend"

      - "traefik.http.routers.niochat-backend-webhooks.rule=(Host(`api.niohub.com.br`) || Host(`chat.niohub.com.br`)) && PathPrefix(`/webhooks/`)"
      - "traefik.http.routers.niochat-backend-webhooks.entrypoints=websecure"
      - "traefik.http.routers.niochat-backend-webhooks.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.niochat-backend-webhooks.priority=20"
      - "traefik.http.routers.niochat-backend-webhooks.service=niochat-backend"

    restart: always

  # ===============================
  # ⚙️ DRAMATIQ WORKER (WhatsApp + CSAT + Finalização)
  # ===============================
  niochat-dramatiq:
    image: ghcr.io/juniorssilvaa/niohub_chat-backend:latest
    container_name: niochat_dramatiq
    depends_on:
      - postgres
    networks:
      - nioNet
    environment:
      # Variáveis Críticas de Sistema
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      DRAMATIQ_BROKER_URL: ${DRAMATIQ_BROKER_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Habilitar agendador de encerramento automático interno (Substitui o Cron)
      RUN_HEARTBEAT: "true"
      
      # Integrações
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      EVOLUTION_URL: ${EVOLUTION_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
      
    command: ["python", "-m", "dramatiq", "conversations.dramatiq_tasks", "integrations.dramatiq_tasks"]
    restart: always

  # ===============================
  # 📱 TELEGRAM WORKER
  # ===============================
  niochat-telegram:
    image: ghcr.io/juniorssilvaa/niohub_chat-backend:latest
    container_name: niochat_telegram
    depends_on:
      - postgres
    networks:
      - nioNet
    environment:
      # Variáveis Críticas de Sistema
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Credenciais Telegram
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      
      # IA e Backend
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
      
    command: ["python", "manage.py", "telegram_worker", "start"]
    restart: always

  # ===============================
  # 🌐 FRONTEND
  # ===============================
  niochat-frontend:
    image: ghcr.io/juniorssilvaa/niohub_chat-frontend:latest
    container_name: niochat_frontend
    networks:
      - nioNet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.niochat-frontend.rule=Host(`chat.niohub.com.br`)"
      - "traefik.http.routers.niochat-frontend.entrypoints=websecure"
      - "traefik.http.routers.niochat-frontend.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.niochat-frontend.priority=1"
    restart: always


networks:
  nioNet:
    external: true

volumes:
  niochat-postgres:
  niochat-media:
  niochat-static: