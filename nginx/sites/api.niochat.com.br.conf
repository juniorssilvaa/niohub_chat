server {
    listen 80;
    listen 443 ssl http2;
    server_name api.niochat.com.br;

    # ============================================================
    # SSL
    # ============================================================
    ssl_certificate /etc/letsencrypt/live/api.niochat.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.niochat.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:D_32;
    ssl_prefer_server_ciphers off;

    # ============================================================
    # Security Headers
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ============================================================
    # Rate Limit (API protection)
    # ============================================================
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req zone=api burst=20 nodelay;

    # ============================================================
    # MAIN BACKEND (Django ASGI - Daphne)
    # ESSENCIAL para OAuth, Webhook e API
    # ============================================================
    location / {
        proxy_pass http://168.194.174.234:8010;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ============================================================
    # WebSocket (Django Channels)
    # ============================================================
    location /ws/ {
        proxy_pass http://168.194.174.234:8010;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ============================================================
    # Static files
    # ============================================================
    location /static/ {
        proxy_pass http://168.194.174.234:8010;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # Media files
    # ============================================================
    location /media/ {
        proxy_pass http://168.194.174.234:8010;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # Gzip
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private must-revalidate auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml;
}
