version: "3.8"

services:
  superadmin-postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - superadmin-postgres:/var/lib/postgresql/data
    networks:
      - NioNet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      restart_policy:
        condition: on-failure

  superadmin-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - superadmin-redis:/data
    networks:
      - NioNet
    deploy:
      restart_policy:
        condition: on-failure

  superadmin-rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - superadmin-rabbitmq:/var/lib/rabbitmq
    networks:
      - NioNet
    deploy:
      restart_policy:
        condition: on-failure

  superadmin-backend:
    image: ghcr.io/juniorssilvaa/niohub_chat-superadmin-backend:latest
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ENVIRONMENT: production
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: superadmin-postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: superadmin-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_AI_DB: 1
      REDIS_CONVERSATION_DB: 2
      REDIS_CACHE_DB: 3
      DRAMATIQ_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@superadmin-rabbitmq:5672//
      BACKEND_URL: https://app.niohub.com.br
      FRONTEND_URL: https://app.niohub.com.br
      ALLOWED_HOSTS: app.niohub.com.br,localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: https://app.niohub.com.br
      CSRF_TRUSTED_ORIGINS: https://app.niohub.com.br
      SUBDOMAIN_TENANT_ENABLED: "true"
      SUBDOMAIN_PRIMARY_DOMAINS: niohub.com.br
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      EVOLUTION_URL: ${EVOLUTION_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_SYSTEM_USER_TOKEN: ${WHATSAPP_SYSTEM_USER_TOKEN}
    volumes:
      - superadmin-media:/app/backend/media
      - superadmin-static:/app/backend/staticfiles
    networks:
      - NioNet
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=NioNet"
      - "traefik.http.routers.superadmin-api.rule=Host(`app.niohub.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/api-token-auth`) || PathPrefix(`/auth`) || PathPrefix(`/webhook`) || PathPrefix(`/webhooks`) || PathPrefix(`/media`) || PathPrefix(`/ws`))"
      - "traefik.http.routers.superadmin-api.entrypoints=websecure"
      - "traefik.http.routers.superadmin-api.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.superadmin-api.priority=30"
      - "traefik.http.services.superadmin-api.loadbalancer.server.port=8010"
    deploy:
      restart_policy:
        condition: on-failure

  superadmin-dramatiq:
    image: ghcr.io/juniorssilvaa/niohub_chat-dramatiq:latest
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ENVIRONMENT: production
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: superadmin-postgres
      POSTGRES_PORT: 5432
      DRAMATIQ_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@superadmin-rabbitmq:5672//
      REDIS_HOST: superadmin-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RUN_HEARTBEAT: "true"
      BACKEND_URL: https://app.niohub.com.br
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      EVOLUTION_URL: ${EVOLUTION_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
    networks:
      - NioNet
    deploy:
      restart_policy:
        condition: on-failure

  superadmin-frontend:
    image: ghcr.io/juniorssilvaa/niohub_chat-superadmin:latest
    networks:
      - NioNet
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=NioNet"
      - "traefik.http.routers.superadmin-front.rule=Host(`app.niohub.com.br`)"
      - "traefik.http.routers.superadmin-front.entrypoints=websecure"
      - "traefik.http.routers.superadmin-front.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.superadmin-front.priority=1"
      - "traefik.http.services.superadmin-front.loadbalancer.server.port=80"
    deploy:
      restart_policy:
        condition: on-failure

networks:
  NioNet:
    external: true

volumes:
  superadmin-postgres:
  superadmin-redis:
  superadmin-rabbitmq:
  superadmin-media:
  superadmin-static:
