name: Deploy NioChat to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: juniorssilvaa/niohub_chat

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      # Usa o Secret do GitHub (NÃO localhost)
      DRAMATIQ_BROKER_URL: ${{ secrets.DRAMATIQ_BROKER_URL }}

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: niochat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6380:6379

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: niochat
          RABBITMQ_DEFAULT_PASS: ccf9e819f70a54bb790487f2438da6ee
        ports:
          - 5672:5672
          - 15672:15672

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.4.1
        run_install: false

    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Node dependencies
      run: |
        cd painel-provedor
        pnpm install --no-frozen-lockfile

    - name: Run backend tests
      env:
        SECRET_KEY: test-secret-key
        DEBUG: True
        ENVIRONMENT: test
        ALLOWED_HOSTS: localhost
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/niochat_test
        DRAMATIQ_BROKER_URL: ${{ secrets.DRAMATIQ_BROKER_URL }}
        CI: true
        GITHUB_ACTIONS: true
      run: |
        cd backend
        python manage.py migrate
        python manage.py test

    - name: Build frontend (painel provedor)
      env:
        VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        VITE_API_URL: "https://api.niohub.com.br/api"
        VITE_WS_URL: "wss://api.niohub.com.br/ws"
        VITE_SUPERADMIN_APP_URL: ${{ secrets.VITE_SUPERADMIN_APP_URL }}
      run: |
        cd painel-provedor
        pnpm install --no-frozen-lockfile
        pnpm build

    - name: Build Superadmin app
      env:
        VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        VITE_API_URL: "https://api.niohub.com.br/api"
        VITE_WS_URL: "wss://api.niohub.com.br/ws"
      run: |
        cd superadmin
        pnpm install --no-frozen-lockfile
        pnpm build


  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build & push BACKEND
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.backend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

    - name: Build & push FRONTEND
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.frontend
        push: true
        build-args: |
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL=https://api.niohub.com.br/api
          VITE_WS_URL=wss://api.niohub.com.br/ws
          VITE_SUPERADMIN_APP_URL=${{ secrets.VITE_SUPERADMIN_APP_URL }}
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}

    - name: Build & push DRAMATIQ
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.dramatiq
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dramatiq:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dramatiq:${{ github.sha }}

    - name: Build & push DOCS
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.docs
        push: true
        platforms: linux/amd64
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-docs:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-docs:${{ github.sha }}

    - run: docker image prune -f


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Portainer
      env:
        PORTAINER_URL: https://portainer.niochat.com.br
        PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
        BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
        FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
        DRAMATIQ_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dramatiq:latest
        DOCS_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-docs:latest
      run: |
        STACKS=$(curl -s -H "X-API-Key: $PORTAINER_API_KEY" "$PORTAINER_URL/api/stacks")
        STACK_ID=$(echo "$STACKS" | jq -r '.[] | select(.Name=="niochat") | .Id')
        COMPOSE=$(cat docker-compose.yml \
          | sed "s|ghcr.io/juniorssilvaa/niochat-backend:latest|$BACKEND_IMAGE|g" \
          | sed "s|ghcr.io/juniorssilvaa/niochat-frontend:latest|$FRONTEND_IMAGE|g" \
          | sed "s|ghcr.io/juniorssilvaa/niochat-dramatiq:latest|$DRAMATIQ_IMAGE|g" \
          | sed "s|ghcr.io/juniorssilvaa/niochat-docs:latest|$DOCS_IMAGE|g")
        ESCAPED=$(echo "$COMPOSE" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
        curl -s -X PUT \
          -H "X-API-Key: $PORTAINER_API_KEY" \
          -H "Content-Type: application/json" \
          --data "{\"StackFileContent\":\"$ESCAPED\"}" \
          "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=1&pullImage=true&forceRecreate=true"
