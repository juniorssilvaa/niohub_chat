name: Deploy NioChat to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: juniorssilvaa/niohub_chat

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      # Usa o Secret do GitHub (NÃO localhost)
      DRAMATIQ_BROKER_URL: ${{ secrets.DRAMATIQ_BROKER_URL }}

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: niochat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6380:6379

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: niochat
          RABBITMQ_DEFAULT_PASS: ccf9e819f70a54bb790487f2438da6ee
        ports:
          - 5672:5672
          - 15672:15672

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.4.1
        run_install: false

    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r painel-provedor/backend/requirements.txt

    - name: Node dependencies
      run: |
        cd painel-provedor/front
        pnpm install --no-frozen-lockfile

    - name: Run backend tests
      env:
        SECRET_KEY: test-secret-key
        DEBUG: True
        ENVIRONMENT: test
        ALLOWED_HOSTS: localhost
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/niochat_test
        DRAMATIQ_BROKER_URL: ${{ secrets.DRAMATIQ_BROKER_URL }}
        CI: true
        GITHUB_ACTIONS: true
      run: |
        cd painel-provedor/backend
        python manage.py migrate
        python manage.py test

    - name: Build frontend (painel provedor)
      env:
        VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        VITE_API_URL: "https://api.niohub.com.br/api"
        VITE_WS_URL: "wss://api.niohub.com.br/ws"
        VITE_SUPERADMIN_APP_URL: ${{ secrets.VITE_SUPERADMIN_APP_URL }}
      run: |
        cd painel-provedor/front
        pnpm install --no-frozen-lockfile
        pnpm build

    - name: Build Superadmin app
      env:
        VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        VITE_API_URL: "https://api.niohub.com.br/api"
        VITE_WS_URL: "wss://api.niohub.com.br/ws"
      run: |
        cd superadmin/front
        pnpm install --no-frozen-lockfile
        pnpm build


  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN || github.token }}

    - name: Build & push BACKEND
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./painel-provedor/Dockerfile.backend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

    - name: Build & push FRONTEND
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./painel-provedor/Dockerfile.frontend
        push: true
        build-args: |
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL=https://api.niohub.com.br/api
          VITE_WS_URL=wss://api.niohub.com.br/ws
          VITE_SUPERADMIN_APP_URL=${{ secrets.VITE_SUPERADMIN_APP_URL }}
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}

    - name: Build & push SUPERADMIN FRONTEND
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./superadmin/Dockerfile.frontend
        push: true
        build-args: |
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL=https://app.niohub.com.br/api
          VITE_WS_URL=wss://app.niohub.com.br/ws
          VITE_SUPERADMIN_APP_URL=https://app.niohub.com.br
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-superadmin:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-superadmin:${{ github.sha }}

    - name: Build & push SUPERADMIN BACKEND
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./superadmin/Dockerfile.backend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-superadmin-backend:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-superadmin-backend:${{ github.sha }}

    - name: Build & push DRAMATIQ
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./painel-provedor/Dockerfile.dramatiq
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dramatiq:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dramatiq:${{ github.sha }}

    - name: Build & push DOCS
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.docs
        push: true
        platforms: linux/amd64
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-docs:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-docs:${{ github.sha }}

    - run: docker image prune -f


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Portainer
      env:
        PORTAINER_URL: ${{ vars.PORTAINER_URL }}
        PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
        STACK_NAME: superadmin
        DEFAULT_ENDPOINT_ID: "1"
      run: |
        set -euo pipefail

        # Verificar se as variáveis estão configuradas
        if [ -z "${PORTAINER_URL:-}" ] || [ -z "${PORTAINER_API_KEY:-}" ]; then
          echo "::warning::PORTAINER_URL ou PORTAINER_API_KEY não configurados. Pulando deploy."
          exit 0
        fi

        STACKS=$(curl -sS -H "X-API-Key: $PORTAINER_API_KEY" "$PORTAINER_URL/api/stacks" || true)
        if ! echo "$STACKS" | jq -e 'type == "array"' >/dev/null 2>&1; then
          echo "::warning::Resposta inválida do Portainer. Pulando deploy automático."
          echo "$STACKS"
          exit 0
        fi

        STACK_ID=$(echo "$STACKS" | jq -r --arg NAME "$STACK_NAME" '.[] | select(.Name == $NAME) | .Id' | head -n 1)
        ENDPOINT_ID=$(echo "$STACKS" | jq -r --arg NAME "$STACK_NAME" '.[] | select(.Name == $NAME) | .EndpointId' | head -n 1)

        if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
          echo "::warning::Stack '$STACK_NAME' não encontrada no Portainer. Pulando deploy (stack pode estar em outro servidor)."
          exit 0
        fi

        if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
          ENDPOINT_ID="$DEFAULT_ENDPOINT_ID"
        fi

        echo "Atualizando stack '$STACK_NAME' (ID: $STACK_ID) no Portainer..."
        COMPOSE=$(cat superadmin/docker-compose.superadmin.yml)
        PAYLOAD=$(jq -n --arg content "$COMPOSE" '{StackFileContent: $content, pullImage: true, prune: true}')

        RESPONSE=$(curl -sS -X PUT \
          -H "X-API-Key: $PORTAINER_API_KEY" \
          -H "Content-Type: application/json" \
          --data "$PAYLOAD" \
          "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID&pullImage=true&forceRecreate=true")

        if echo "$RESPONSE" | jq -e '.message? and (.message | type == "string")' >/dev/null 2>&1; then
          echo "::warning::Resposta do Portainer: $(echo "$RESPONSE" | jq -r '.message')"
        else
          echo "Deploy concluido com sucesso!"
        fi

